<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quentin et les Carapils</title>
<style>
  body {
    margin: 0;
    background: #2c1810;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    color: #ffd700;
    min-height: 100vh;
    user-select: none;
  }
  h1 {
    margin: 15px;
    font-size: 32px;
    text-shadow: 2px 2px 0 #000;
  }
  #info {
    margin-bottom: 10px;
    opacity: 0.85;
    color: white;
    text-align: center;
  }
  canvas {
    background: linear-gradient(to bottom, #4a2c1a, #2c1810);
    border: 4px solid #ffd700;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(255,215,0,0.3);
  }
  #hud {
    display: flex;
    gap: 40px;
    margin-top: 15px;
    font-size: 22px;
    font-weight: bold;
  }
  #best {
    opacity: 0.7;
    font-size: 16px;
    margin-top: 5px;
    color: white;
  }
</style>
</head>
<body>
  <h1>Quentin et les Carapils</h1>
  <div id="info">Fleches gauche / droite. Attrape les Carapils (+1), evite l'eau (-2) !</div>
  <canvas id="game" width="500" height="600"></canvas>
  <div id="hud">
    <div id="score">Score: 0</div>
    <div id="time">Temps: 60</div>
  </div>
  <div id="best">Record: 0</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const bestEl = document.getElementById('best');

const W = canvas.width, H = canvas.height;
const quentin = { x: W/2 - 30, y: H - 95, w: 60, h: 80 };
const keys = {};
let cans = [];
let waters = [];
let particles = [];
let vomitParticles = [];
let score = 0;
let best = parseInt(localStorage.getItem('bestCarapils') || '0');
let timeLeft = 60;
let gameOver = false;
let spawnTimer = 0;
let lastTime = performance.now();

// state: 'normal' | 'drinking' | 'vomiting' | 'hit'
let state = 'normal';
let stateTimer = 0;
let vomitSpawnTimer = 0;

bestEl.textContent = 'Record: ' + best;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === 'r' || e.key === 'R') && gameOver) restart();
});
document.addEventListener('keyup', e => keys[e.key] = false);

function restart() {
  cans = [];
  waters = [];
  particles = [];
  vomitParticles = [];
  score = 0;
  timeLeft = 60;
  gameOver = false;
  quentin.x = W/2 - 30;
  state = 'normal';
  stateTimer = 0;
  vomitSpawnTimer = 0;
  lastTime = performance.now();
}

function spawnCan() {
  cans.push({
    x: 20 + Math.random() * (W - 60),
    y: -50,
    w: 30,
    h: 50,
    speed: 2 + Math.random() * 3 + (60 - timeLeft) * 0.04,
    rotation: 0,
    spinSpeed: (Math.random() - 0.5) * 0.08
  });
}

function spawnWater() {
  waters.push({
    x: 20 + Math.random() * (W - 60),
    y: -50,
    w: 26,
    h: 50,
    speed: 2.5 + Math.random() * 2.5 + (60 - timeLeft) * 0.03,
    rotation: 0,
    spinSpeed: (Math.random() - 0.5) * 0.06
  });
}

function drawCan(can) {
  ctx.save();
  ctx.translate(can.x + can.w/2, can.y + can.h/2);
  ctx.rotate(can.rotation);
  ctx.translate(-can.w/2, -can.h/2);
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(0, 5, can.w, can.h - 10);
  ctx.fillStyle = '#ffeb80';
  ctx.fillRect(3, 7, 4, can.h - 14);
  ctx.fillStyle = '#b8860b';
  ctx.fillRect(0, 0, can.w, 8);
  ctx.fillRect(0, can.h - 8, can.w, 8);
  ctx.fillStyle = '#8b0000';
  ctx.fillRect(2, can.h/2 - 8, can.w - 4, 16);
  ctx.fillStyle = 'white';
  ctx.font = 'bold 9px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('CARA', can.w/2, can.h/2 + 3);
  ctx.restore();
}

function drawWater(wb) {
  ctx.save();
  ctx.translate(wb.x + wb.w/2, wb.y + wb.h/2);
  ctx.rotate(wb.rotation);
  ctx.translate(-wb.w/2, -wb.h/2);
  // bottle body (light blue)
  ctx.fillStyle = 'rgba(173, 216, 230, 0.9)';
  ctx.fillRect(3, 12, wb.w - 6, wb.h - 14);
  // bottle neck
  ctx.fillRect(wb.w/2 - 5, 5, 10, 10);
  // cap
  ctx.fillStyle = '#1e6dc8';
  ctx.fillRect(wb.w/2 - 6, 0, 12, 6);
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(5, 15, 3, wb.h - 20);
  // label
  ctx.fillStyle = '#1e6dc8';
  ctx.fillRect(3, wb.h/2 - 6, wb.w - 6, 12);
  ctx.fillStyle = 'white';
  ctx.font = 'bold 8px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('EAU', wb.w/2, wb.h/2 + 2);
  ctx.restore();
}

function drawQuentin() {
  const x = quentin.x, y = quentin.y, w = quentin.w, h = quentin.h;
  const cx = x + w/2;
  const khaki = '#8b7d4b';
  const khakiDark = '#6b5d35';
  const skin = '#fdbcb4';
  const isVomiting = state === 'vomiting';
  const isDrinking = state === 'drinking';
  const isHit = state === 'hit';

  const headOffsetY = isDrinking ? -3 : 0;
  const shake = isVomiting ? (Math.random() - 0.5) * 3 : 0;

  // red flash when hit
  if (isHit && Math.floor(stateTimer / 120) % 2 === 0) {
    ctx.globalAlpha = 0.55;
  }

  // shoes
  ctx.fillStyle = '#2c1e0e';
  ctx.fillRect(x + 13 + shake, y + h - 6, 18, 6);
  ctx.fillRect(x + w - 31 + shake, y + h - 6, 18, 6);

  // legs (khaki)
  ctx.fillStyle = khaki;
  ctx.fillRect(x + 15 + shake, y + h - 22, 12, 18);
  ctx.fillRect(x + w - 27 + shake, y + h - 22, 12, 18);
  ctx.fillStyle = khakiDark;
  ctx.fillRect(x + 20 + shake, y + h - 22, 1, 18);
  ctx.fillRect(x + w - 22 + shake, y + h - 22, 1, 18);

  // t-shirt
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 11 + shake, y + 34, w - 22, 10);

  // arms depending on state
  ctx.fillStyle = skin;
  if (isDrinking) {
    ctx.fillRect(x + 2 + shake, y + 34, 10, 18);
    ctx.fillRect(x + w - 14 + shake, y + 12, 10, 30);
  } else if (isVomiting) {
    ctx.fillRect(x + 2 + shake, y + 38, 10, 20);
    ctx.fillRect(x + w - 12 + shake, y + 38, 10, 20);
  } else {
    ctx.fillRect(x + 2 + shake, y + 22, 10, 25);
    ctx.fillRect(x + w - 12 + shake, y + 22, 10, 25);
  }

  // overalls body
  ctx.fillStyle = khaki;
  ctx.fillRect(x + 10 + shake, y + 40, w - 20, h - 62);
  ctx.fillRect(x + 14 + shake, y + 30, 7, 14);
  ctx.fillRect(x + w - 21 + shake, y + 30, 7, 14);
  ctx.fillStyle = khakiDark;
  ctx.fillRect(x + 14 + shake, y + 43, 7, 2);
  ctx.fillRect(x + w - 21 + shake, y + 43, 7, 2);
  ctx.strokeStyle = khakiDark;
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 23 + shake, y + 46, 14, 10);
  ctx.fillStyle = '#d4a017';
  ctx.beginPath(); ctx.arc(x + 17 + shake, y + 42, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w - 17 + shake, y + 42, 2, 0, Math.PI * 2); ctx.fill();

  // head
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.arc(cx + shake, y + 24 + headOffsetY, 15, 0, Math.PI * 2);
  ctx.fill();
  // hair tufts
  ctx.fillStyle = '#3d2817';
  ctx.fillRect(cx - 15 + shake, y + 20 + headOffsetY, 4, 6);
  ctx.fillRect(cx + 11 + shake, y + 20 + headOffsetY, 4, 6);

  // cap
  ctx.fillStyle = '#8b0000';
  ctx.beginPath();
  ctx.ellipse(cx + 3 + shake, y + 19 + headOffsetY, 18, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#d32f2f';
  ctx.beginPath();
  ctx.arc(cx + shake, y + 15 + headOffsetY, 16, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(cx - 16 + shake, y + 15 + headOffsetY, 32, 4);
  ctx.fillStyle = '#e85050';
  ctx.fillRect(cx - 14 + shake, y + 6 + headOffsetY, 3, 10);
  ctx.fillStyle = '#a32020';
  ctx.fillRect(cx - 16 + shake, y + 17 + headOffsetY, 32, 2);
  ctx.fillStyle = 'white';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('TRUMP', cx + shake, y + 13 + headOffsetY);

  // face by state
  if (isVomiting) {
    // X eyes
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 8 + shake, y + 23); ctx.lineTo(cx - 4 + shake, y + 27);
    ctx.moveTo(cx - 4 + shake, y + 23); ctx.lineTo(cx - 8 + shake, y + 27);
    ctx.moveTo(cx + 4 + shake, y + 23); ctx.lineTo(cx + 8 + shake, y + 27);
    ctx.moveTo(cx + 8 + shake, y + 23); ctx.lineTo(cx + 4 + shake, y + 27);
    ctx.stroke();
    // open puking mouth
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 7 + shake, y + 30, 14, 9);
    ctx.fillStyle = '#4a7c2a';
    ctx.fillRect(cx - 6 + shake, y + 32, 12, 6);
  } else if (isDrinking) {
    // happy eyes
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx - 6 + shake, y + 25 + headOffsetY, 3, Math.PI, 0);
    ctx.moveTo(cx + 9 + shake, y + 25 + headOffsetY);
    ctx.arc(cx + 6 + shake, y + 25 + headOffsetY, 3, Math.PI, 0);
    ctx.stroke();
    // can tilted at mouth
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(cx - 5 + shake, y + 26 + headOffsetY, 11, 14);
    ctx.fillStyle = '#b8860b';
    ctx.fillRect(cx - 5 + shake, y + 26 + headOffsetY, 11, 3);
    ctx.fillStyle = '#8b0000';
    ctx.fillRect(cx - 4 + shake, y + 31 + headOffsetY, 9, 4);
    // drinking line from can to mouth
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 2 + shake, y + 26 + headOffsetY);
    ctx.lineTo(cx - 2 + shake, y + 33 + headOffsetY);
    ctx.stroke();
  } else {
    // normal face
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 7 + shake, y + 25, 3, 3);
    ctx.fillRect(cx + 4 + shake, y + 25, 3, 3);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx + shake, y + 30, 4, 0, Math.PI);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;

  // NAME LABEL above head
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 2, y - 22, w - 4, 18);
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(x + 4, y - 20, w - 8, 14);
  ctx.fillStyle = '#000';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('QUENTIN', cx, y - 9);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.moveTo(cx - 4, y - 4);
  ctx.lineTo(cx + 4, y - 4);
  ctx.lineTo(cx, y);
  ctx.closePath();
  ctx.fill();
}

function spawnSparkles(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 7,
      vy: -Math.random() * 6 - 2,
      life: 30,
      color: Math.random() < 0.5 ? '#ffd700' : '#fff'
    });
  }
}

function spawnWaterSplash(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 5 - 2,
      life: 25,
      color: '#6cb4ee'
    });
  }
}

function spawnVomitParticle() {
  const mx = quentin.x + quentin.w/2;
  const my = quentin.y + 36;
  vomitParticles.push({
    x: mx + (Math.random() - 0.5) * 8,
    y: my,
    vx: (Math.random() - 0.5) * 2.5,
    vy: 1.5 + Math.random() * 2,
    life: 70,
    size: 3 + Math.random() * 4,
    color: Math.random() < 0.3 ? '#6a9c3a' : (Math.random() < 0.5 ? '#7fb040' : '#a8c856')
  });
}

function showVomitMessage() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  const text = 'BEURK !';
  ctx.font = 'bold 36px Arial';
  const tw = ctx.measureText(text).width;
  ctx.fillRect(W/2 - tw/2 - 15, H/2 - 50, tw + 30, 50);
  ctx.fillStyle = '#7fb040';
  ctx.textAlign = 'center';
  ctx.fillText(text, W/2, H/2 - 15);
}

function update(dt) {
  if (gameOver) return;

  timeLeft -= dt / 1000;
  if (timeLeft <= 0) {
    timeLeft = 0;
    gameOver = true;
    if (score > best) {
      best = score;
      localStorage.setItem('bestCarapils', best);
    }
  }

  // state timer
  if (stateTimer > 0) {
    stateTimer -= dt;
    if (state === 'vomiting') {
      vomitSpawnTimer += dt;
      if (vomitSpawnTimer > 40) {
        spawnVomitParticle();
        spawnVomitParticle();
        vomitSpawnTimer = 0;
      }
    }
    if (stateTimer <= 0) {
      state = 'normal';
      stateTimer = 0;
    }
  }

  // movement (blocked during vomit)
  const canMove = state !== 'vomiting';
  const speed = 7;
  if (canMove) {
    if ((keys['ArrowLeft'] || keys['q'] || keys['Q']) && quentin.x > 0) quentin.x -= speed;
    if ((keys['ArrowRight'] || keys['d'] || keys['D']) && quentin.x + quentin.w < W) quentin.x += speed;
  }

  // spawning
  spawnTimer += dt;
  const spawnRate = Math.max(280, 800 - (60 - timeLeft) * 10);
  if (spawnTimer > spawnRate) {
    if (Math.random() < 0.75) spawnCan();
    else spawnWater();
    spawnTimer = 0;
  }

  // cans
  cans.forEach(c => {
    c.y += c.speed;
    c.rotation += c.spinSpeed;
  });
  cans = cans.filter(c => {
    if (c.y > H) return false;
    if (state !== 'vomiting' &&
        quentin.x < c.x + c.w && quentin.x + quentin.w > c.x &&
        quentin.y < c.y + c.h && quentin.y + quentin.h > c.y) {
      score++;
      spawnSparkles(c.x + c.w/2, c.y + c.h/2);
      if (score > 0 && score % 10 === 0) {
        state = 'vomiting';
        stateTimer = 1600;
        vomitSpawnTimer = 0;
      } else {
        state = 'drinking';
        stateTimer = 400;
      }
      return false;
    }
    return true;
  });

  // waters
  waters.forEach(w => {
    w.y += w.speed;
    w.rotation += w.spinSpeed;
  });
  waters = waters.filter(w => {
    if (w.y > H) return false;
    if (state !== 'vomiting' &&
        quentin.x < w.x + w.w && quentin.x + quentin.w > w.x &&
        quentin.y < w.y + w.h && quentin.y + quentin.h > w.y) {
      score = Math.max(0, score - 2);
      spawnWaterSplash(w.x + w.w/2, w.y + w.h/2);
      state = 'hit';
      stateTimer = 500;
      return false;
    }
    return true;
  });

  // particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  vomitParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  });
  vomitParticles = vomitParticles.filter(p => p.life > 0);

  scoreEl.textContent = 'Score: ' + score;
  timeEl.textContent = 'Temps: ' + Math.ceil(timeLeft);
  bestEl.textContent = 'Record: ' + best;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a0e06';
  ctx.fillRect(0, H - 15, W, 15);

  cans.forEach(drawCan);
  waters.forEach(drawWater);
  drawQuentin();

  // vomit splats
  vomitParticles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, p.life / 25);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 30;
    ctx.fillRect(p.x, p.y, 4, 4);
  });
  ctx.globalAlpha = 1;

  if (state === 'vomiting') showVomitMessage();

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('FINI !', W/2, H/2 - 60);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 24px Arial';
    ctx.fillText('Quentin a bu ' + score + ' Carapils', W/2, H/2 - 10);
    if (score >= best && score > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 20px Arial';
      ctx.fillText('Nouveau record !', W/2, H/2 + 25);
    }
    ctx.fillStyle = 'white';
    ctx.font = '18px Arial';
    ctx.fillText('Appuie sur R pour rejouer', W/2, H/2 + 70);
  }
}

function loop(now) {
  const dt = now - lastTime;
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
